name: Update External Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh external comparison data
        run: python3 scripts/update_external_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extra_data/phdstipends-comparison.static.json extra_data/epi-family-budget.static.json
          git diff --cached --quiet && exit 0
          git commit -m "Update external data snapshots"
          git push
